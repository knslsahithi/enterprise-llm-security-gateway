apiVersion: apps/v1
kind: Deployment

metadata:
  name: llm-security-gateway

spec:
  replicas: 2

  selector:
    matchLabels:
      app: llm-security-gateway

  template:
    metadata:
      labels:
        app: llm-security-gateway

    spec:
      containers:
      - name: llm-security-gateway

        image: llm-security-gateway:latest

        ports:
        - containerPort: 8000