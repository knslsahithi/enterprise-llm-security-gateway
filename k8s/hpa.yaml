apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: llm-security-gateway-hpa

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: llm-security-gateway

  minReplicas: 2
  maxReplicas: 10

  metrics:
  - type: Resource

    resource:
      name: cpu

      target:
        type: Utilization
        averageUtilization: 70